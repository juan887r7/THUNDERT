        /* Estilos internos para asegurar la superposición del texto */
        .contenedor-categorias {
            display: flex;

        }
        .enlace-categoria {

            width: 100%;
        }
        .categoria-item {

        }
        .categoria-item img {

            height: auto;
            display: block;

        }
        .texto-superpuesto {
            position: absolute;
            top: 50%;
            left: 50%;

            text-align: center;
            width: 100%;
            color: white;

            font-weight: 900;

        .texto-superpuesto {

        .carrusel-wrapper, .seccion-ultimo, .ultimo-ind, .flecha-carrusel {

    <script>
        function moverCarrusel(distancia) {
            const contenedor = document.getElementById('contenedor-carrusel');
            contenedor.scrollBy({ left: distancia, behavior: 'smooth' });
        }
        function selTipo(btn, tipo) {
            const info = btn.closest('.ultimo-info');
            info.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            info.querySelectorAll('.tallas-ropa, .tallas-zapato').forEach(g => g.classList.remove('visible'));
            info.querySelector('.tallas-' + tipo).classList.add('visible');
            info.querySelectorAll('.talla-btn').forEach(b => b.classList.remove('selected'));
        }
        function selTalla(btn) {
            const grupo = btn.closest('.tallas-grupo');
            grupo.querySelectorAll('.talla-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        function comprarUltimo(btn, producto, tel) {
            const card = btn.closest('.ultimo-ind');
            const talla = card.querySelector('.talla-btn.selected');
            const tipo = card.querySelector('.tipo-btn.selected');
            if (tipo && !talla) { alert('Por favor selecciona una talla.'); return; }
            const t = talla ? ` — Talla: ${talla.textContent}` : '';
            const msg = `Hola Thundert, me interesa: ${producto}${t}`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
