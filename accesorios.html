<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thundert - Accesorios</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <h1>ACCESORIOS THUNDERT</h1>
    </header>

    <main class="contenedor-principal">
        <!-- Ejemplo de Joyería -->
        <div class="ultimo-ind">
            <img class="producto" src="img/pulsera.png" alt="Accesorio">
            <span class="nombre-pro">PULSERA DORADA LUXURY</span>
            <div class="precio">45.000 $</div>
            <a href="#" class="boton-comprar-wa">COMPRAR</a>
        </div>

        <!-- Ejemplo de Gorras -->
        <div class="ultimo-ind">
            <img class="producto" src="img/gorra.png" alt="Gorra">
            <span class="nombre-pro">CAP STREETWEAR NEGRA</span>
            <div class="precio">55.000 $</div>
            <a href="#" class="boton-comprar-wa">COMPRAR</a>
        </div>
    </main>
</body>
</html>
